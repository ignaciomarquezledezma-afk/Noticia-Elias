<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia Elías - Noticias positivas para niños</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fed7aa 0%, #fef3c7 50%, #fce7f3 100%);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: linear-gradient(90deg, #fb923c, #fcd34d, #f472b6);
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 48px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            font-family: cursive;
            margin-bottom: 10px;
        }

        header p {
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
        }

        .week-indicator {
            text-align: center;
            margin-bottom: 30px;
        }

        .week-box {
            display: inline-block;
            background: white;
            border-radius: 50px;
            padding: 15px 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 4px solid #fed7aa;
        }

        .week-box p {
            color: #b45309;
            font-weight: bold;
            font-size: 20px;
            margin: 0;
        }

        article {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 30px;
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-emoji {
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .article-content {
            padding: 30px;
        }

        .article-content h2 {
            font-size: 32px;
            color: #111827;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .pais-badge {
            display: inline-block;
            background: #fef08a;
            border-radius: 50px;
            padding: 8px 15px;
            margin-bottom: 20px;
        }

        .pais-badge p {
            color: #991b1b;
            font-weight: bold;
            font-size: 14px;
            margin: 0;
        }

        .noticia-text {
            color: #374151;
            font-size: 18px;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .dato-curioso {
            background: linear-gradient(90deg, #d1fae5, #ccfbf1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 4px solid #10b981;
        }

        .dato-curioso p:first-child {
            color: #065f46;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        .dato-curioso p:last-child {
            color: #1f2937;
            font-weight: 600;
            font-size: 16px;
            margin: 0;
        }

        .reflexion {
            background: linear-gradient(90deg, #fce7f3, #fee2e2);
            border-radius: 15px;
            padding: 20px;
            border: 4px solid #ec4899;
        }

        .reflexion p:first-child {
            color: #831843;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        .reflexion p:last-child {
            color: #1f2937;
            font-weight: 600;
            font-size: 16px;
            margin: 0;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .btn-prev {
            background: linear-gradient(90deg, #f472b6, #fb7185);
            color: white;
        }

        .btn-next {
            background: linear-gradient(90deg, #60a5fa, #06b6d4);
            color: white;
        }

        .control-info {
            flex: 1;
            min-width: 150px;
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 4px solid #fcd34d;
            text-align: center;
        }

        .control-info p {
            color: #b45309;
            font-weight: bold;
            font-size: 14px;
            margin: 0;
        }

        footer {
            text-align: center;
            margin-bottom: 30px;
        }

        footer p {
            color: #4b5563;
            font-weight: 600;
            margin: 10px 0;
        }

        footer .subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 36px;
            }

            .article-content h2 {
                font-size: 24px;
            }

            .controls {
                flex-direction: column;
            }

            button, .control-info {
                min-width: auto;
            }
        }
    </style>
</head>

        let semanaActual = obtenerSemana();

        function obtenerSemana() {
            const ahora = new Date();
            const inicio = new Date(ahora.getFullYear(), 0, 1);
            const diferencia = ahora - inicio;
            const unDia = 24 * 60 * 60 * 1000;
            const dia = Math.floor(diferencia / unDia);
            return Math.ceil((dia + inicio.getDay() + 1) / 7);
        }

            document.getElementById('pais').textContent = noticia.pais;
            document.getElementById('contenido').textContent = noticia.contenido;
            document.getElementById('dato').textContent = noticia.datoCurioso;
            document.getElementById('reflexion').textContent = noticia.reflexion;
        }

        function semanaAnterior() {
            semanaActual = semanaActual === 1 ? 52 : semanaActual - 1;
            mostrarNoticia();
        }

        function semanaSiguiente() {
            semanaActual = semanaActual === 52 ? 1 : semanaActual + 1;
            mostrarNoticia();
        }

        // Mostrar la noticia al cargar
        mostrarNoticia();
    </script>
</body>
</html>
